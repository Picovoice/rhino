name: iOS AWS Device Farm Tests

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - '.github/workflows/ios-devicefarm.yml'
      - 'binding/ios/RhinoAppTest/**'
      - 'resources/.test/**'
      - 'resources/audio_samples/**'
  pull_request:
    branches: [ master, 'v[0-9]+.[0-9]+' ]
    paths:
      - '.github/workflows/ios-devicefarm.yml'
      - 'binding/ios/RhinoAppTest/**'
      - 'resources/.test/**'
      - 'resources/audio_samples/**'

defaults:
  run:
    working-directory: binding/ios/RhinoAppTest

jobs:
  build:
    name: Run iOS Tests on AWS Device Farm
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Installing Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run:
          pip3 install requests boto3

      - name: Make build dir
        run: mkdir ddp

      - name: Copy test_resources
        run: ./copy_test_resources.sh

      - name: Inject AccessKey
        run: sed -i '.bak' 's:{TESTING_ACCESS_KEY_HERE}:${{secrets.PV_VALID_ACCESS_KEY}}:'
          RhinoAppTestUITests/BaseTest.swift

      - name: Inject Device
        run: sed -i '.bak' 's:{TESTING_DEVICE_HERE}:cpu\:1:'
          RhinoAppTestUITests/BaseTest.swift

      - name: XCode Build
        run: xcrun xcodebuild build-for-testing
          -configuration Debug
          -project RhinoAppTest.xcodeproj
          -sdk iphoneos
          -scheme RhinoAppTest
          -derivedDataPath ddp
          CODE_SIGNING_ALLOWED=NO

      - name: Generating ipa
        run: cd ddp/Build/Products/Debug-iphoneos/ &&
          mkdir Payload &&
          cp -r RhinoAppTest.app Payload &&
          zip --symlinks -r RhinoAppTest.ipa Payload &&
          rm -r Payload

      - name: Zipping Tests
        run: cd ddp/Build/Products/Debug-iphoneos/ &&
          zip --symlinks -r RhinoAppTestUITests.zip RhinoAppTestUITests-Runner.app

      - name: Run tests on AWS Device Farm
        run: python3 ../../../script/automation/devicefarm.py
          --type ios
          --run_name rhino-ios-unit
          --app_path "ddp/Build/Products/Debug-iphoneos/RhinoAppTest.ipa"
          --test_path "ddp/Build/Products/Debug-iphoneos/RhinoAppTestUITests.zip"
          --aws_id "${{secrets.AWS_DEVICE_FARM_ACCESS_KEY_ID}}"
          --aws_secret "${{secrets.AWS_DEVICE_FARM_ACCESS_KEY_SECRET}}"
          --project_arn "${{secrets.AWS_DEVICE_FARM_PROJECT_ARN}}"
          --test_spec_arn "${{secrets.AWS_DEVICE_FARM_IOS_TEST_SPEC_ARN}}"
          --device_pool_arn "${{secrets.AWS_DEVICE_FARM_IOS_DEVICE_POOL_ARN}}"
